<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Meshy Model Viewer</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #111722;
            color: #d6e2ff;
            font-family: Segoe UI, sans-serif;
        }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            padding: 6px 10px;
            border-radius: 8px;
            background: rgba(4, 8, 15, 0.74);
            font-size: 12px;
            line-height: 1.3;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="status">Viewer ready.</div>
    <script src="./vendor/three.min.js"></script>
    <script src="./vendor/GLTFLoader.r146.js"></script>
    <script src="./vendor/OrbitControls.r146.js"></script>
    <script>
        (function () {
            const status = document.getElementById("status");
            const hostBridge = window.chrome && window.chrome.webview ? window.chrome.webview : null;
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111722);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            const camera = new THREE.PerspectiveCamera(42, window.innerWidth / Math.max(1, window.innerHeight), 0.1, 400);
            camera.position.set(5, 4.3, 6.6);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.minDistance = 1.3;
            controls.maxDistance = 40;

            const hemiLight = new THREE.HemisphereLight(0xeaf3ff, 0x3d5a7a, 0.85);
            const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
            keyLight.position.set(8, 14, 7);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.width = 2048;
            keyLight.shadow.mapSize.height = 2048;
            keyLight.shadow.camera.left = -12;
            keyLight.shadow.camera.right = 12;
            keyLight.shadow.camera.top = 12;
            keyLight.shadow.camera.bottom = -12;
            scene.add(hemiLight, keyLight);

            const loader = new THREE.GLTFLoader();
            let activeModel = null;
            let activeLoadRequestId = 0;

            function postHostMessage(type, message, detail) {
                if (!hostBridge || typeof hostBridge.postMessage !== "function") {
                    return;
                }

                try {
                    hostBridge.postMessage({
                        type: type,
                        message: message,
                        detail: detail || null
                    });
                } catch (_error) {
                    // Ignore host bridge errors.
                }
            }

            function setStatus(message, type, detail) {
                status.textContent = message;
                postHostMessage(type || "status", message, detail);
            }

            function describeError(error) {
                if (!error) {
                    return "Unknown loader error";
                }

                if (typeof error === "string") {
                    return error;
                }

                if (error.message && typeof error.message === "string") {
                    return error.message;
                }

                if (error.target && error.target.statusText) {
                    return String(error.target.statusText);
                }

                try {
                    return JSON.stringify(error);
                } catch (_jsonError) {
                    return String(error);
                }
            }

            function clearCurrentModel() {
                if (!activeModel) {
                    return;
                }

                scene.remove(activeModel);
                disposeObject(activeModel);
                activeModel = null;
            }

            function disposeObject(root) {
                if (!root || typeof root.traverse !== "function") {
                    return;
                }

                root.traverse((node) => {
                    if (node.geometry) {
                        node.geometry.dispose();
                    }
                    if (node.material) {
                        if (Array.isArray(node.material)) {
                            node.material.forEach((material) => material.dispose());
                        } else {
                            node.material.dispose();
                        }
                    }
                });
            }

            function fitCameraToObject(root) {
                const box = new THREE.Box3().setFromObject(root);
                if (box.isEmpty()) {
                    return;
                }

                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxSize = Math.max(size.x, size.y, size.z, 0.1);
                const distance = maxSize * 1.9;

                controls.target.copy(center);
                camera.position.set(center.x + distance, center.y + distance * 0.75, center.z + distance);
                camera.near = Math.max(0.01, maxSize / 200);
                camera.far = Math.max(120, maxSize * 15);
                camera.updateProjectionMatrix();
                controls.update();
            }

            function loadMeshModelInternal(url, label, onFailed) {
                const loadRequestId = ++activeLoadRequestId;
                clearCurrentModel();
                if (!url || typeof url !== "string") {
                    setStatus("Load failed: model URL is empty.", "load-failed");
                    if (typeof onFailed === "function") {
                        onFailed("Model URL is empty.");
                    }
                    return;
                }

                const cleanedUrl = url.trim();
                const cleanedLabel = label || "Model";
                setStatus(`Loading: ${cleanedLabel}...`, "loading", { url: cleanedUrl, label: cleanedLabel });

                loader.load(cleanedUrl, function (gltf) {
                    if (loadRequestId !== activeLoadRequestId) {
                        const staleRoot = gltf.scene || (gltf.scenes && gltf.scenes[0]);
                        if (staleRoot) {
                            disposeObject(staleRoot);
                        }
                        return;
                    }

                    const root = gltf.scene || (gltf.scenes && gltf.scenes[0]);
                    if (!root) {
                        setStatus("No scene found in model.", "load-failed", { url: cleanedUrl, label: cleanedLabel });
                        return;
                    }

                    root.traverse((node) => {
                        if (node.isMesh) {
                            node.castShadow = true;
                            node.receiveShadow = true;
                        }
                    });

                    clearCurrentModel();
                    scene.add(root);
                    activeModel = root;
                    fitCameraToObject(root);
                    const triangleCount = activeModel && activeModel.children ? activeModel.children.length : 0;
                    setStatus(
                        `Loaded: ${cleanedLabel}`,
                        "model-loaded",
                        { url: cleanedUrl, label: cleanedLabel, rootChildren: triangleCount });
                }, function (progress) {
                    if (loadRequestId !== activeLoadRequestId) {
                        return;
                    }

                    if (!progress || !progress.total) {
                        return;
                    }

                    const percent = Math.max(0, Math.min(100, Math.round((progress.loaded / progress.total) * 100)));
                    if (percent === 100) {
                        return;
                    }

                    setStatus(`Loading: ${cleanedLabel}... ${percent}%`, "loading", {
                        url: cleanedUrl,
                        label: cleanedLabel,
                        percent: percent
                    });
                }, function (error) {
                    if (loadRequestId !== activeLoadRequestId) {
                        return;
                    }

                    const errorMessage = describeError(error);
                    setStatus(
                        `Load failed: ${errorMessage}`,
                        "load-failed",
                        { url: cleanedUrl, label: cleanedLabel, error: errorMessage });
                    if (typeof onFailed === "function") {
                        onFailed(errorMessage);
                    }
                });
            }

            window.loadMeshModel = function (url, label) {
                loadMeshModelInternal(url, label);
            };

            window.loadMeshModelWithFallback = function (primaryUrl, fallbackUrl, label) {
                const primary = typeof primaryUrl === "string" ? primaryUrl.trim() : "";
                const fallback = typeof fallbackUrl === "string" ? fallbackUrl.trim() : "";
                const hasFallback = fallback && fallback !== primary;

                loadMeshModelInternal(primary, label, function (primaryError) {
                    if (!hasFallback) {
                        return;
                    }

                    setStatus(
                        `Primary load failed; retrying fallback URL...`,
                        "loading",
                        { primaryError: primaryError, fallbackUrl: fallback });
                    loadMeshModelInternal(fallback, label);
                });
            };

            window.addEventListener("resize", function () {
                camera.aspect = window.innerWidth / Math.max(1, window.innerHeight);
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            window.addEventListener("error", function (event) {
                const message = event && event.message ? event.message : "Unknown script error";
                setStatus(`Viewer script error: ${message}`, "viewer-error", { message: message });
            });

            window.addEventListener("unhandledrejection", function (event) {
                const reason = event && event.reason ? describeError(event.reason) : "Unhandled promise rejection";
                setStatus(`Viewer promise error: ${reason}`, "viewer-error", { reason: reason });
            });

            (function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            })();

            setStatus("Viewer ready.", "viewer-ready");
        })();
    </script>
</body>
</html>
